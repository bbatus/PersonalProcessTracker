version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: ppt_database
    environment:
      POSTGRES_USER: ppt_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ppt_password}
      POSTGRES_DB: personal_process_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ppt_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for sessions and rate limiting
  redis:
    image: redis:7-alpine
    container_name: ppt_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend (FastAPI) - Docker Hub'dan
  backend:
    image: bbatus/ppt-backend:latest
    container_name: ppt_backend
    environment:
      DATABASE_URL: postgresql://ppt_user:${DB_PASSWORD:-ppt_password}@db:5432/personal_process_tracker
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_DAYS: 7
      EMAIL_HOST: smtp.gmail.com
      EMAIL_PORT: 587
      EMAIL_USERNAME: ${EMAIL_USERNAME:-your-email@gmail.com}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-your-app-password}
      EMAIL_FROM: ${EMAIL_FROM:-your-email@gmail.com}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-your-google-client-id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-your-google-client-secret}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8001/api/auth/google/callback}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      RATE_LIMIT_PER_MINUTE: 100
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  # Frontend (Next.js) - Docker Hub'dan
  frontend:
    image: bbatus/ppt-frontend:latest
    container_name: ppt_frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
  redis_data:
